services:

  # FastAPI Application
  fastapi:
    build: .
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - minio
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Celery Worker for async background jobs
  celery_worker:
    build: .
    container_name: celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - minio
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --queues=data_copy,celery

  # Redis broker/backend for Celery
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO Storage (S3-compatible)
  minio:
    image: quay.io/minio/minio
    container_name: minio_storage
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

      # 🔥 IMPORTANT (fix for :9001 redirect)
      MINIO_SERVER_URL: https://storage.v11tech.com
      MINIO_BROWSER_REDIRECT_URL: https://console.storage.v11tech.com

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

volumes:
  minio_data:
  redis_data:
