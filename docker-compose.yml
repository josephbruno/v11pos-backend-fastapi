version: "3.9"

services:

  # FastAPI Application
  fastapi:
    build: .
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - minio
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # MinIO Storage (S3-compatible)
  minio:
    image: quay.io/minio/minio
    container_name: minio_storage
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

      # 🔥 IMPORTANT (fix for :9001 redirect)
      MINIO_SERVER_URL: https://storage.v11tech.com
      MINIO_BROWSER_REDIRECT_URL: https://console.storage.v11tech.com

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

volumes:
  minio_data:
